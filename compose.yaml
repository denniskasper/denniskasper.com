services:
  web:
    build:
      context: ./
      target: dev
    container_name: web
    command: pnpm dev-watch
    ports:
      - '4321:4321'
    environment:
      NODE_ENV: development
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4321/').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./public
          target: /app/public
        - action: rebuild
          path: package.json
        - action: rebuild
          path: pnpm-lock.yaml
