pid /tmp/nginx.pid;
worker_processes auto;

events {
  worker_connections 1024;
}

http {
  server_tokens off;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none';" always;

  server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;
    include /etc/nginx/mime.types;

    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    error_page 404 /404.html;
    location = /404.html {
      internal;
    }

    location / {
      try_files $uri $uri/index.html $uri.html;
      add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Astro content-hashed assets — cache immutably
    location /_astro/ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Other static assets
    location ~* \.(ico|pdf|woff2|woff|ttf)$ {
      expires 30d;
      add_header Cache-Control "public, max-age=2592000" always;
    }
  }
}
