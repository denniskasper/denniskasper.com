name: Deploy to VPS

on:
  push:
    branches: main
    paths-ignore:
      - README.md
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Fetch resume
        run: pnpm fetch-resume

      - name: Build project
        run: pnpm build

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm pw:test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Fetch resume
        run: pnpm fetch-resume

      - name: Build production bundle
        run: pnpm build

      - name: Archive dist folder
        run: tar -czf dist.tar.gz ./dist

      - name: Generate checksum
        run: sha256sum dist.tar.gz > dist.tar.gz.sha256

      - name: Copy files via ssh
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: "dist.tar.gz,dist.tar.gz.sha256"
          target: /var/www/denniskasper.com/html
          rm: true

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Verify checksum, extract, and atomically swap
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd /var/www/denniskasper.com/html
            sha256sum -c dist.tar.gz.sha256 || { echo "Checksum mismatch"; exit 1; }
            tar -zxf dist.tar.gz -C /tmp/
            mv /var/www/denniskasper.com/html /var/www/denniskasper.com/html.old
            mv /tmp/dist /var/www/denniskasper.com/html
            rm -rf /var/www/denniskasper.com/html.old
